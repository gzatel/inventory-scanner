    :root {

  --primary: #4f46e5;
  --primary-dark: #4338ca;

  --success: #2e7d32;
  --success-dark: #1b5e20;

  --danger: #c62828;

    * {

    #reader {

    .summary {

    }

    .buttons {

        repeat(auto-fit, minmax(110px, 180px));

    button {

      border: none;

      color: white;

      padding: 14px 18px;

    .download {

    }

    }

    table {

      width: 100%;

      border-collapse: collapse;

      margin-top: 15px;

      background: var(--card);

      border-radius: 12px;

      overflow: hidden;

      box-shadow: var(--shadow);
    }

    th {

      background: var(--primary);

      color: white;

      padding: 14px;

    }

    td {
      padding: 12px;

    th:nth-child(3),

    .qty {

    html {

    #reader video {

    #topBar {

      position: sticky;

      z-index: 999;

      background: #ffffffcc;
      backdrop-filter: blur(10px);

      color: #1f2937;

      border-radius: 18px;

      border: 1px solid #e5e7eb;;

      box-shadow:
        0 10px 25px rgba(0,0,0,0.35);

  <script>

    // =========================
    // INVENTORY STORAGE
    // =========================

    let currentBoxNumber = 1;

    let currentBox =
        `BOX_${String(currentBoxNumber).padStart(3, "0")}`;

    let searchTerm = "";
    let projectName = "";

    let boxes = {};

    let lastScan = "";
    let lastScanTime = 0;
    let scanDelay = 800;
    let scanHistory = [];
    let undoGroupDelay = 1200;

    let html5QrCode = null;

    let scannerStarting = false;

    // =========================
    // SOUND
    // =========================

    const successSound = new Audio(
        "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
    );

    successSound.preload = "auto";

    const errorSound = new Audio(
        "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    );

    errorSound.preload = "auto";

    function beep(success = true) {

        const sound =
        success
        ? successSound
        : errorSound;

        sound.pause();

        sound.currentTime = 0;

        sound.play().catch(() => {});
    }

    // =========================
    // UPDATE TABLE
    // =========================

function setupProject() {

  if (
    typeof projectName === "string" &&
    projectName.trim() !== ""
  ) {
    return;
  }

  const saved =
    localStorage.getItem("qrInventoryData");

  if (saved) {

    try {

      const data = JSON.parse(saved);

      if (
        data.projectName &&
        data.projectName.trim() !== ""
      ) {

        projectName =
          data.projectName.trim();

        return;
      }

    } catch(err) {}
  }

  const name = prompt(
    "Enter Project Name"
  );

  projectName =
    name && name.trim()
      ? name.trim()
      : "Inventory";

  saveData();
}


  function escapeHTML(text) {

    return String(text)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }


    function renderTable() {

  try {

    const tbody =
      document.getElementById("tableBody");

    tbody.innerHTML = "";

    let total = 0;

    const inventory =
      boxes[currentBox] || {};

    Object.values(inventory)
      .sort((a, b) =>
        a.partNumber.localeCompare(b.partNumber)
      )
      .forEach(item => {
        
        total += item.qty;

        const key =
          `${item.partNumber}|${item.nameEN}`;

        const safeKey =
          encodeURIComponent(key);

        const row = `
        <tr>

          <td>
            ${escapeHTML(item.partNumber)}
          </td>

          <td>
            ${escapeHTML(item.nameEN)}
          </td>

          <td class="qty">

            <div style="
              display:flex;
              align-items:center;
              justify-content:center;
              gap:10px;
            ">

              <button
                onclick="decreaseQty('${safeKey}')"
                style="
                  background:var(--danger);
                  width:40px;
                  height:40px;
                  border-radius:50%;
                  font-size:24px;
                  padding:0;
                "
              >
                -
              </button>

              <div
                onclick="editQty('${safeKey}')"
                style="
                  min-width:40px;
                  text-align:center;
                  font-size:22px;
                  font-weight:bold;
                  cursor:pointer;
                "
              >
                ${item.qty}
              </div>

              <button
                onclick="increaseQty('${safeKey}')"
                style="
                  background:var(--success-dark);
                  width:40px;
                  height:40px;
                  border-radius:50%;
                  font-size:24px;
                  padding:0;
                "
              >
                +
              </button>

            </div>

          </td>

        </tr>
      `;

        tbody.insertAdjacentHTML(
          "beforeend",
          row
        );
      });

    document.getElementById("totalItems")
      .innerText = total;

    document.getElementById("boxName")
      .innerText =
      `${projectName} • ${currentBox} ▼`;

  }
  catch(err) {

    console.error(err);

    document.getElementById("status")
      .innerHTML = `
        <div style="
          color:var(--danger);
          font-size:18px;
        ">
          ${err}
        </div>
      `;
  }
}

function createNewBox() {

  const currentInventory =
  boxes[currentBox] || {};

  const hasItems =
    Object.keys(currentInventory).length > 0;

  if (!hasItems) {

    alert("Current box is empty");

    return;
  }

  currentBoxNumber++;

  currentBox =
    `BOX_${String(currentBoxNumber)
      .padStart(3, "0")}`;

  boxes[currentBox] = {};

  document.getElementById("status")
    .innerHTML = "";

  renderTable();

  saveData();
}

function previousBox() {

  if (currentBoxNumber <= 1) {
    return;
  }

  currentBoxNumber--;

  currentBox =
    `BOX_${String(currentBoxNumber)
      .padStart(3, "0")}`;

  renderTable();
  saveData();
}

function nextBox() {

  const next =
    currentBoxNumber + 1;

  const nextBoxName =
    `BOX_${String(next)
      .padStart(3, "0")}`;

  if (!boxes[nextBoxName]) {
    return;
  }

  currentBoxNumber++;

  currentBox = nextBoxName;

  renderTable();
  saveData();
}

function increaseQty(encodedKey) {

  const key =
    decodeURIComponent(encodedKey);

  const inventory =
    boxes[currentBox];

  if (!inventory?.[key]) {
    return;
  }

  inventory[key].qty++;

  renderTable();

  saveData();
}

function decreaseQty(encodedKey) {

  const key =
    decodeURIComponent(encodedKey);

  const inventory =
    boxes[currentBox];

  if (!inventory?.[key]) {
    return;
  }

  if (inventory[key].qty > 1) {

    inventory[key].qty--;

  } else {

    delete inventory[key];
  }

  renderTable();

  saveData();
}

function editQty(encodedKey) {

  const key =
    decodeURIComponent(encodedKey);

  const inventory =
    boxes[currentBox];

  if (!inventory?.[key]) {
    return;
  }

  const currentQty =
    inventory[key].qty;

  const newQty = prompt(
    "New Quantity:",
    currentQty
  );

  if (newQty === null) {
    return;
  }

  const qty =
    parseInt(newQty);

  if (isNaN(qty) || qty < 1) {

    alert("Invalid quantity");

    return;
  }

  inventory[key].qty = qty;

  renderTable();

  saveData();
}

    // =========================
    // PROCESS QR
    // =========================

    function processQR(decodedText) {

      try {

        const parts =
          decodedText.trim().split(/\s+/);

        if (decodedText.length > 1000) {

          beep(false);

          return;
        }

        if (parts.length < 6) {

          beep(false);

          document.getElementById("status")
            .innerHTML =
            `<span class="error">
              Invalid QR
            </span>`;

          return;
        }

        // Eliminar:
        // fecha / serial / qty

        if (parts.length >= 3) {

          parts.splice(-3);

        }

        // Obtener:
        // Part Number

        const partNumber =
          parts.shift();

        // Ignorar japonés

        if (parts.length > 0) {
          parts.shift();
        }

        // Resto = EN

        const nameEN =
          parts.join(" ");

        // Anti doble scan accidental

        const uniqueKey =
          `${partNumber}|${nameEN}`;

        const now = Date.now();

        if (
          uniqueKey === lastScan &&
          now - lastScanTime < scanDelay
        ) {
          return;
        }

        lastScan = uniqueKey;
        lastScanTime = now;

        // Agregar / incrementar

        const inventory =
         boxes[currentBox] || (boxes[currentBox] = {});

        if (!inventory[uniqueKey]) {

          inventory[uniqueKey] = {
            partNumber,
            nameEN,
            qty: 0
          };
        }

        inventory[uniqueKey].qty++;

        scanHistory.push({
          key: uniqueKey,
          box: currentBox,
          timestamp: Date.now()
        });

if (scanHistory.length > 200) {
  scanHistory.shift();
}

        beep(true);
        navigator.vibrate?.(80);

       document.getElementById("status").innerHTML =
         `
        <div style="
          font-size:22px;
          font-weight:bold;
          color:var(--success);
        ">
          ${escapeHTML(partNumber)}
        </div>
        <div style="font-size:16px;">
          ${escapeHTML(nameEN)}
        </div>
        `;

        renderTable();

        saveData();

        setTimeout(() => {

            if (
              document.getElementById("status")
                .innerText.includes(partNumber)
            ) {

              document.getElementById("status")
                .innerHTML = "";
            }

          }, 2500); 

      }
      catch(err) {

        console.error(err);

        beep(false);
        navigator.vibrate?.(110);

        document.getElementById("status")
          .innerHTML =
          `<span class="error">
            Error reading QR
          </span>`;
      }
    }


  function setScanMode(value) {

  scanDelay = value;

  let mode = "Normal";

  if (value <= 400) {
    mode = "Fast";
  }

  else if (value >= 1200) {
    mode = "Safe";
  }

  document.getElementById(
    "scanModeText"
  ).innerText =
    `${mode} (${scanDelay} ms)`;

  saveData();
}

    // =========================
    // QR SCANNER
    // =========================
/*
const qrConfig = {
  fps: 20,

  qrbox: 180, // MÁS PEQUEÑO = MÁS RÁPIDO
  aspectRatio: 1.0,
  
  videoConstraints: {
    width: { ideal: 1280 },
    height: { ideal: 720 },
    facingMode: "environment",
    //focusMode: "continuous"
  }
};
*/



function startScanner() {

   if (
      html5QrCode ||
      scannerStarting
    ) {
      return;
    }

    scannerStarting = true;

    html5QrCode =
      new Html5Qrcode("reader");

  Html5Qrcode.getCameras()
    .then(devices => {

      if (!devices || devices.length === 0) {
        console.error("No cameras found");
        return;
      }

      let cameraId = devices[0].id;

      const backCam = devices.find(d =>
        (d.label || "").toLowerCase().includes("back") ||
        (d.label || "").toLowerCase().includes("rear")
      );

      if (backCam) {
        cameraId = backCam.id;
      }

      html5QrCode.start(
  cameraId,
  {
    fps: 12,
    qrbox: 180,
    videoConstraints: {
      facingMode: "environment",
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  },
  processQR
)
.then(() => {

  scannerStarting = false;

  console.log("Camera started");

  setTimeout(() => {

    const video =
      document.querySelector("#reader video");

    if (video) {

      video.setAttribute(
        "playsinline",
        true
      );

      video.setAttribute(
        "muted",
        true
      );

      video.muted = true;
    }

  }, 500);

})
.catch(err => {

  scannerStarting = false;

  html5QrCode = null;

  console.error(
    "Camera start error:",
    err
  );

  document.getElementById(
    "status"
  ).innerHTML = `
    <div style="
      color:var(--danger);
      font-size:18px;
      font-weight:bold;
      text-align:center;
      margin-top:12px;
    ">
      Camera permission denied
    </div>
  `;
});

    })
    .catch(err => {
      console.error("Camera access error:", err);
    });
}


  async function stopScanner() {

    if (!html5QrCode) {
      return;
    }

    try {

      await html5QrCode.stop();
      await html5QrCode.clear();

    } catch(err) {

      console.error(err);

    }

    html5QrCode = null;
  }


loadData();

if (!boxes[currentBox]) {
  boxes[currentBox] = {};
}

setScanMode(scanDelay);

renderTable();

window.addEventListener("load", () => {

  if (!projectName?.trim()) {
    setupProject();
  }

  setTimeout(startScanner, 300);

});



  function undoLastScan() {

  const group =
    getLastScanGroup();

  if (group.length === 0) {

    alert("Nothing to undo");

    return;
  }

  group.forEach(scan => {

    const inventory =
      boxes[scan.box];

    if (!inventory) {
      return;
    }

    const item =
      inventory[scan.key];

    if (!item) {
      return;
    }

    item.qty--;

    if (item.qty <= 0) {

      delete inventory[scan.key];
    }
  });

  const last =
    group[group.length - 1];

  currentBox =
    last.box;

  currentBoxNumber =
    parseInt(
      currentBox.replace("BOX_", "")
    );

  scanHistory.splice(
    scanHistory.length - group.length,
    group.length
  );

  beep(false);

  navigator.vibrate?.(150);

  document.getElementById("status")
    .innerHTML =
    `
    <div style="
      color:var(--warning);
      font-size:22px;
      font-weight:bold;
    ">
      Removed ${group.length} scans
    </div>
    `;

  renderTable();

  saveData();
}



    // =========================
    // filtro busqueda
    // =========================

    function updateSearch() {

      searchTerm =
        document
          .getElementById("searchInput")
          .value
          .toLowerCase();

      const table =
        document.querySelector("table");

      table.style.display =
        searchTerm
          ? "none"
          : "";

      if (!searchTerm) {

        renderTable();

        document.getElementById(
          "searchResults"
        ).innerHTML = "";

      } else {

        renderGlobalSearch();
      }

    }


    function renderGlobalSearch() {

  const container =
    document.getElementById(
      "searchResults"
    );

  container.innerHTML = "";

  if (!searchTerm) {
    return;
  }

  Object.entries(boxes)
    .forEach(([boxName, inventory]) => {

      Object.values(inventory)
        .forEach(item => {

          const text =
            (
              item.partNumber +
              " " +
              item.nameEN
            ).toLowerCase();

          if (
            !text.includes(searchTerm)
          ) {
            return;
          }

          const div =
            document.createElement("div");

          div.style = `
            background:var(--card);
            padding:12px;
            margin-bottom:8px;
            border-radius:10px;
            border:1px solid var(--border);
          `;

          div.innerHTML = `
            <strong>
              ${escapeHTML(item.partNumber)}
            </strong>
            <br>

            ${escapeHTML(item.nameEN)}

            <br><br>

            <strong>
              ${escapeHTML(boxName)}
            </strong>

            — Qty:
            ${item.qty}
          `;

          div.onclick = () => {

            currentBox = boxName;

            currentBoxNumber =
              parseInt(
                boxName.replace("BOX_", "")
              );

            renderTable();

            container.innerHTML = "";

            document
              .getElementById("searchInput")
              .value = "";

            searchTerm = "";
          };

          container.appendChild(div);
        });
    });
}


    // =========================
    // LOCAL SAVE
    // =========================

    function saveData() {

  try {

    const data = {
      projectName,
      currentBoxNumber,
      currentBox,
      scanDelay,
      boxes
    };

    localStorage.setItem(
      "qrInventoryData",
      JSON.stringify(data)
    );

  }
  catch(err) {

    console.error(
      "Save error",
      err
    );

    alert(
      "Storage full. Export your data."
    );
  }
}

    function loadData() {

  const saved =
    localStorage.getItem("qrInventoryData");

  if (!saved) {
    return;
  }

  try {

    const data =
      JSON.parse(saved);

    projectName =
  data.projectName || "";

    currentBoxNumber =
      data.currentBoxNumber || 1;

    currentBox =
      data.currentBox || "BOX_001";

    Object.keys(boxes).forEach(key => {
      delete boxes[key];
    });

    Object.assign(
      boxes,
      data.boxes || {}
    );

    scanDelay = data.scanDelay ?? 800;

  }
  catch(err) {

    console.error(
      "Error loading saved data",
      err
    );
  }
}

        renderBoxList();

        boxList.style.display = "block";

      else {

    // =========================
    // EXPORT EXCEL
    // =========================

    function styleWorksheet(worksheet) {

      if (!worksheet["!ref"]) {
          return;
        }

        const range =
          XLSX.utils.decode_range(
            worksheet["!ref"]
          );

      for (
        let R = range.s.r;
        R <= range.e.r;
        ++R
      ) {

        for (
          let C = range.s.c;
          C <= range.e.c;
          ++C
        ) {

          const cellAddress =
            XLSX.utils.encode_cell({
              r: R,
              c: C
            });

          const cell =
            worksheet[cellAddress];

          if (!cell) {
            continue;
          }

          cell.s = {

            font: {
              name: "Arial",
              sz: 11
            },

            alignment: {
              vertical: "center",
              wrapText: true
            },

            border: {

              top: {
                style: "thin",
                color: { rgb: "E0E0E0" }
              },

              bottom: {
                style: "thin",
                color: { rgb: "E0E0E0" }
              },

              left: {
                style: "thin",
                color: { rgb: "E0E0E0" }
              },

              right: {
                style: "thin",
                color: { rgb: "E0E0E0" }
              }

            }

          };



          // HEADER TABLE

          if (R === 4) {

            cell.s = {

              font: {
                bold: true,
                color: {
                  rgb: "FFFFFF"
                }
              },

              fill: {
                fgColor: {
                  rgb: "e87d7d"
                }
              },

              alignment: {
                horizontal: "center",
                vertical: "center"
              },

              border: {
                top: {
                  style: "thin",
                  color: { rgb: "CCCCCC" }
                },
                bottom: {
                  style: "thin",
                  color: { rgb: "CCCCCC" }
                },
                left: {
                  style: "thin",
                  color: { rgb: "CCCCCC" }
                },
                right: {
                  style: "thin",
                  color: { rgb: "CCCCCC" }
                }
              }

            };
          }



          // INFO ROWS

          if (
            R <= 2 &&
            C === 0
          ) {

            cell.s.font = {
              bold: true
            };
          }

          // ZEBRA ROWS

          if (
            R >= 5 &&
            R % 2 === 0
          ) {

            cell.s.fill = {
              fgColor: {
                rgb: "F5F5F5"
              }
            };
          }

          // QTY COLUMN

          if (
                C === 2 &&
                R >= 5
              ) {

                cell.s.alignment = {
                  horizontal: "center",
                  vertical: "center"
                };

                cell.s.font = {
                  bold: true,
                  sz: 14,
                  color: {
                    rgb: "222222"
                  }
                };
              }
        }
      }

      worksheet["!rows"] = [];

      for (let i = 0; i < 500; i++) {

        worksheet["!rows"].push({
          hpt: 22
        });
      } 


    }


    function downloadExcel() {

      const exportName =
       prompt("Project Name");

        if (
          !exportName ||
          !exportName.trim()
        ) {
          return;
        }

        projectName =
          exportName.trim();

        saveData();

        const safeExportName =
          exportName.replace(
            /[^a-z0-9]/gi,
            "_"
          );

        const workbook =
        XLSX.utils.book_new();

        // =========================
        // SUMMARY DATA
        // =========================

        const totalBoxes =
          Object.keys(boxes).length;

        let totalItems = 0;

        const summaryRows = [];

        const globalItems = {};

        Object.entries(boxes)
            .forEach(([boxName, inventory]) => {

              let boxTotal = 0;

              Object.values(inventory)
                .forEach(item => {

                  boxTotal += item.qty;
                  totalItems += item.qty;

                  const globalKey =
                   `${item.partNumber}|${item.nameEN}`;

                  if (!globalItems[globalKey]) {

                    globalItems[globalKey] = {

                      partNumber: item.partNumber,
                      nameEN: item.nameEN,
                      totalQty: 0,
                      boxes: new Set()

                    };
                  }

                  globalItems[globalKey].totalQty += item.qty;

                  globalItems[globalKey].boxes.add(boxName);

                });

              summaryRows.push([
                boxName,
                boxTotal
              ]);
            });

         const summarySheet =
            XLSX.utils.aoa_to_sheet([

              ["PROJECT SUMMARY"],
              ["Project", projectName],
              ["Export Date", new Date().toLocaleDateString()],
              ["Total Boxes", totalBoxes],
              ["Total Items", totalItems],
              [],
              ["Box", "Items"],
              ...summaryRows

            ]);

        summarySheet["!merges"] = [

          {
            s: { r: 0, c: 0 },
            e: { r: 0, c: 2 }
          }

        ];

        // Column widths

        summarySheet["!cols"] = [
          { wch: 25 },
          { wch: 15 }
        ];

        // Freeze header

        summarySheet["!freeze"] = {

          xSplit: 0,
          ySplit: 7,

          topLeftCell: "A8",

          activePane: "bottomLeft",

          state: "frozen"
        };

        // Filter

        summarySheet["!autofilter"] = {
          ref: "A7:B7"
        };

        styleWorksheet(summarySheet);

        // Add sheet

        XLSX.utils.book_append_sheet(
          workbook,
          summarySheet,
          "SUMMARY"
        );

        // =========================
        // GLOBAL SUMMARY
        // =========================

        const globalData =
          Object.values(globalItems)
            .map(item => ({

              "Part Number":
                item.partNumber,

              "Details":
                item.nameEN,

              "Total Qty":
                item.totalQty,

              "Boxes":
                Array.from(item.boxes)
                  .sort()
                  .join(", ")

            }))
            .sort((a, b) =>
              a["Part Number"]
                .localeCompare(
                  b["Part Number"]
                )
            );

        const globalSheet =
          XLSX.utils.aoa_to_sheet([

            ["GLOBAL INVENTORY"],
            [],
            [],
            [],

            [
              "Part Number",
              "Details",
              "Total Qty",
              "Boxes"
            ]

          ]);

         globalSheet["!merges"] = [

            {
              s: { r: 0, c: 0 },
              e: { r: 0, c: 3 }
            }

          ];

        XLSX.utils.sheet_add_json(
          globalSheet,
          globalData,
          {
            origin: "A6",
            skipHeader: true
          }
        );

        // widths

        globalSheet["!cols"] = [

          { wch: 22 },
          { wch: 45 },
          { wch: 12 },
          { wch: 35 }

        ];

        // filter

        globalSheet["!autofilter"] = {
          ref: "A5:D5"
        };

        // freeze

        globalSheet["!freeze"] = {

          xSplit: 0,
          ySplit: 5,

          topLeftCell: "A6",

          activePane: "bottomLeft",

          state: "frozen"
        };

        // style

        styleWorksheet(globalSheet);

        XLSX.utils.book_append_sheet(
          workbook,
          globalSheet,
          "GLOBAL_SUMMARY"
        );

        Object.entries(boxes)
            .forEach(([boxName, inventory]) => {

            const data =
                Object.values(inventory).map(item => ({
                "Part Number": item.partNumber,
                "Details": item.nameEN,
                "Qty": item.qty
                }));

            const worksheet = XLSX.utils.aoa_to_sheet([

              [`Project`, projectName],
              [`Box`, boxName],
              [`Export Date`, new Date().toLocaleDateString()],
              [],

              ["Part Number", "Details", "Qty"]

            ]);

            XLSX.utils.sheet_add_json(
              worksheet,
              data,
              {
                origin: "A6",
                skipHeader: true
              }
            );

                // Column widths

                  worksheet["!cols"] = [
                    { wch: 22 },
                    { wch: 45 },
                    { wch: 10 }
                  ];

                  // Auto filter

                  worksheet["!autofilter"] = {
                    ref: "A5:C5"
                  };

                  // Freeze top row

                  worksheet["!freeze"] = {

                    xSplit: 0,
                    ySplit: 5,

                    topLeftCell: "A6",

                    activePane: "bottomLeft",

                    state: "frozen"
                  };

                  styleWorksheet(worksheet);

            XLSX.utils.book_append_sheet(
                workbook,
                worksheet,
                boxName
            );
            });

        const now = new Date();

        const date =
          now.toISOString().split("T")[0];


        const fileName =
          `${safeExportName}_` +
          `${date}_` +
          `${totalBoxes}Boxes_` +
          `${totalItems}Items.xlsx`;

                XLSX.writeFile(
                    workbook,
                    fileName
                );
            }


    // =========================
    // scanGroup
    // =========================

    function getLastScanGroup() {

  if (scanHistory.length === 0) {
    return [];
  }

  const group = [];

  const last =
    scanHistory[
      scanHistory.length - 1
    ];

  group.push(last);

  for (
    let i = scanHistory.length - 2;
    i >= 0;
    i--
  ) {

    const current =
      scanHistory[i];

    const sameKey =
      current.key === last.key;

    const sameBox =
      current.box === last.box;

    const closeTime =
      last.timestamp -
      current.timestamp
      <= undoGroupDelay;

    if (
      sameKey &&
      sameBox &&
      closeTime
    ) {

      group.push(current);

    } else {

      break;
    }
  }

  return group;
}

    // =========================
    // import excel
    // =========================

      async function importExcel(event) {

      const file =
        event.target.files[0];

      if (!file) {
        return;
      }

      const confirmReplace =
        confirm(
          "Replace current inventory?"
        );

      if (!confirmReplace) {
        return;
      }

      try {

        const data =
          await file.arrayBuffer();

        const workbook =
          XLSX.read(data);


        const summarySheet =
          workbook.Sheets["SUMMARY"];

        if (summarySheet) {

          const importedProject =
            summarySheet["B2"]?.v;

          if (importedProject) {

            projectName =
              importedProject;
          }
        }
        

        // Reset inventory

        boxes = {};
        scanHistory = [];

        // Read all sheets

        workbook.SheetNames
          .forEach(sheetName => {

            // Ignore summary

            if (
              !sheetName.startsWith("BOX_")
            ) {
              return;
            }

            const worksheet =
              workbook.Sheets[sheetName];

            // Read rows starting at line 6

            const rows =
              XLSX.utils.sheet_to_json(
                worksheet,
                {
                  range: 4
                }
              );

            boxes[sheetName] = {};

            rows.forEach(row => {

              if (
                  typeof row !== "object"
                ) {
                  return;
                }

              const partNumber =
                row["Part Number"];

              const nameEN =
                row["Details"];

              const qty =
                Number(row["Qty"]) || 0;

              if (
                !partNumber ||
                !nameEN ||
                qty <= 0
              ) {
                return;
              }

              const key =
               `${partNumber}|${nameEN}`;

              boxes[sheetName][key] = {
                partNumber,
                nameEN,
                qty
              };
            });
          });

        // Restore first box

        const firstBox =
          Object.keys(boxes)
            .sort()[0];

        currentBox =
          firstBox || "BOX_001";

        currentBoxNumber =
          parseInt(
            currentBox.replace(
              "BOX_",
              ""
            )
          ) || 1;

        renderTable();

        saveData();

        beep(true);

        document.getElementById(
          "status"
        ).innerHTML =
        `
        <div style="
          color:var(--success);
          font-size:22px;
          font-weight:bold;
        ">
          Excel Imported
        </div>
        `;

      }
      catch(err) {

        console.error(err);

        beep(false);

        alert(
          "Error importing Excel"
        );
      }

      // Reset input

      event.target.value = "";
    }


    // =========================
    // CLEAR DATA
    // =========================

    function clearData() {

  if (!confirm("Clear ALL data?")) {
    return;
  }

  // Reset boxes

  currentBoxNumber = 1;

  currentBox = "BOX_001";

  projectName = "";

  scanHistory = [];

  lastScan = "";

  lastScanTime = 0;

  Object.keys(boxes).forEach(key => {
    delete boxes[key];
  });

  boxes[currentBox] = {};

  // Clear local storage

  localStorage.removeItem(
    "qrInventoryData"
  );

  // Clear UI

  document.getElementById("status")
    .innerHTML = "";

  renderTable();

  saveData();
}
