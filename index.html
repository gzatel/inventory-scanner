  <script>

    // =========================
    // INVENTORY STORAGE
    // =========================

    let currentBoxNumber = 1;

    let currentBox =
        `BOX_${String(currentBoxNumber).padStart(3, "0")}`;

    let searchTerm = "";
    let projectName = "";

    let boxes = {};

    let lastScan = "";
    let lastScanTime = 0;
    let lastAction = null;
    let scanDelay = 800;
    let scanHistory = [];
    let undoGroupDelay = 1200;

    // =========================
    // SOUND
    // =========================

    const successSound = new Audio(
        "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
    );

    successSound.preload = "auto";

    const errorSound = new Audio(
        "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    );

    errorSound.preload = "auto";

    function beep(success = true) {

        const sound =
        success
        ? successSound
        : errorSound;

        sound.currentTime = 0;

        sound.play();
    }

    // =========================
    // UPDATE TABLE
    // =========================

    function setupProject() {

  if (projectName) {
    return;
  }

  const name = prompt(
    "Enter Project Name"
  );

  if (!name || !name.trim()) {

    projectName = "Inventory";

  } else {

    projectName =
      name.trim();
  }

  saveData();
}



    function renderTable() {

  try {

    const tbody =
      document.getElementById("tableBody");

    tbody.innerHTML = "";

    let total = 0;

    const inventory =
      boxes[currentBox] || {};

    Object.values(inventory)
      .sort((a, b) =>
        a.partNumber.localeCompare(b.partNumber)
      )
      .forEach(item => {
        
        total += item.qty;

        const key =
          `${item.partNumber}|${item.nameEN}`;

        const safeKey =
          key.replace(/'/g, "\\'");

        const row = `
        <tr>

          <td>
            ${item.partNumber}
          </td>

          <td>
            ${item.nameEN}
          </td>

          <td class="qty">

            <div style="
              display:flex;
              align-items:center;
              justify-content:center;
              gap:10px;
            ">

              <button
                onclick="decreaseQty('${safeKey}')"
                style="
                  background:#d32f2f;
                  width:40px;
                  height:40px;
                  border-radius:50%;
                  font-size:24px;
                  padding:0;
                "
              >
                -
              </button>

              <div
                onclick="editQty('${safeKey}')"
                style="
                  min-width:40px;
                  text-align:center;
                  font-size:22px;
                  font-weight:bold;
                  cursor:pointer;
                "
              >
                ${item.qty}
              </div>

              <button
                onclick="increaseQty('${safeKey}')"
                style="
                  background:#388e3c;
                  width:40px;
                  height:40px;
                  border-radius:50%;
                  font-size:24px;
                  padding:0;
                "
              >
                +
              </button>

            </div>

          </td>

        </tr>
      `;

        tbody.insertAdjacentHTML(
          "beforeend",
          row
        );
      });

    document.getElementById("totalItems")
      .innerText = total;

    document.getElementById("boxName")
  .innerText =
  `${projectName} • ${currentBox}`;

  }
  catch(err) {

    console.error(err);

    document.getElementById("status")
      .innerHTML = `
        <div style="
          color:red;
          font-size:18px;
        ">
          ${err}
        </div>
      `;
  }
}

function createNewBox() {

  const hasItems =
    Object.keys(boxes[currentBox]).length > 0;

  if (!hasItems) {

    alert("Current box is empty");

    return;
  }

  currentBoxNumber++;

  currentBox =
    `BOX_${String(currentBoxNumber)
      .padStart(3, "0")}`;

  boxes[currentBox] = {};

  document.getElementById("status")
    .innerHTML = "";

  renderTable();

  //saveDate();
  saveData();
}

function previousBox() {

  if (currentBoxNumber <= 1) {
    return;
  }

  currentBoxNumber--;

  currentBox =
    `BOX_${String(currentBoxNumber)
      .padStart(3, "0")}`;

  renderTable();
  saveData();
}

function nextBox() {

  const next =
    currentBoxNumber + 1;

  const nextBoxName =
    `BOX_${String(next)
      .padStart(3, "0")}`;

  if (!boxes[nextBoxName]) {
    return;
  }

  currentBoxNumber++;

  currentBox = nextBoxName;

  renderTable();
  saveData();
}

function increaseQty(key) {

  boxes[currentBox][key].qty++;

  renderTable();

  //saveDate();
  saveData();
}

function decreaseQty(key) {

  if (boxes[currentBox][key].qty > 1) {

    boxes[currentBox][key].qty--;

  } else {

    delete boxes[currentBox][key];
  }

  renderTable();

  //saveDate();
  saveData();
}

function editQty(key) {

  const currentQty =
    boxes[currentBox][key].qty;

  const newQty = prompt(
    "New Quantity:",
    currentQty
  );

  if (newQty === null) {
    return;
  }

  const qty =
    parseInt(newQty);

  if (isNaN(qty) || qty < 1) {

    alert("Invalid quantity");

    return;
  }

  boxes[currentBox][key].qty = qty;

  renderTable();

  //saveDate();
  saveData();
}

    // =========================
    // PROCESS QR
    // =========================

    function processQR(decodedText) {

      try {

        const parts =
          decodedText.trim().split(/\s+/);

        if (parts.length < 6) {

          beep(false);

          document.getElementById("status")
            .innerHTML =
            `<span class="error">
              Invalid QR
            </span>`;

          return;
        }

        // Eliminar:
        // fecha / serial / qty

        parts.pop();
        parts.pop();
        parts.pop();

        // Obtener:
        // Part Number

        const partNumber =
          parts.shift();

        // Ignorar japonés

        parts.shift();

        // Resto = EN

        const nameEN =
          parts.join(" ");

        // Anti doble scan accidental

        const uniqueKey =
          `${partNumber}|${nameEN}`;

        const now = Date.now();

        if (
          uniqueKey === lastScan &&
          now - lastScanTime < scanDelay
        ) {
          return;
        }

        lastScan = uniqueKey;
        lastScanTime = now;

        // Agregar / incrementar

        const inventory = 
          boxes[currentBox];

        if (!inventory[uniqueKey]) {

          inventory[uniqueKey] = {
            partNumber,
            nameEN,
            qty: 0
          };
        }

        inventory[uniqueKey].qty++;

        scanHistory.push({
          key: uniqueKey,
          box: currentBox,
          timestamp: Date.now()
        });

if (scanHistory.length > 200) {
  scanHistory.shift();
}

        lastAction = {
          box: currentBox,
          key: uniqueKey
        };

        beep(true);
        navigator.vibrate?.(80);

       document.getElementById("status").innerHTML =
         `
        <div style="
          font-size:22px;
          font-weight:bold;
          color:#2e7d32;
        ">
          ${partNumber}
        </div>
        <div style="font-size:16px;">
          ${nameEN}
        </div>
        `;

        renderTable();

        saveData();

      }
      catch(err) {

        console.error(err);

        beep(false);
        navigator.vibrate?.(110);

        document.getElementById("status")
          .innerHTML =
          `<span class="error">
            Error reading QR
          </span>`;
      }
    }


  function setScanMode(value) {

  scanDelay = value;

  let mode = "Normal";

  if (value <= 400) {
    mode = "Fast";
  }

  else if (value >= 1200) {
    mode = "Safe";
  }

  document.getElementById(
    "scanModeText"
  ).innerText =
    `${mode} (${scanDelay} ms)`;

  saveData();
}

    // =========================
    // QR SCANNER
    // =========================
/*
const qrConfig = {
  fps: 20,

  qrbox: 180, // MÁS PEQUEÑO = MÁS RÁPIDO
  aspectRatio: 1.0,
  
  videoConstraints: {
    width: { ideal: 1280 },
    height: { ideal: 720 },
    facingMode: "environment",
    //focusMode: "continuous"
  }
};
*/



function startScanner() {

  const html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras()
    .then(devices => {

      if (!devices || devices.length === 0) {
        console.error("No cameras found");
        return;
      }

      let cameraId = devices[0].id;

      const backCam = devices.find(d =>
        (d.label || "").toLowerCase().includes("back") ||
        (d.label || "").toLowerCase().includes("rear")
      );

      if (backCam) {
        cameraId = backCam.id;
      }

      html5QrCode.start(
        cameraId,
        {
          fps: 20,
          qrbox: 180,
          videoConstraints: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        },
        processQR
      )
      .then(() => {
        console.log("Camera started");
      })
      .catch(err => {
        console.error("Camera start error:", err);
      });

    })
    .catch(err => {
      console.error("Camera access error:", err);
    });
}

loadData();

setupProject();

if (!boxes[currentBox]) {
  boxes[currentBox] = {};
}

setScanMode(scanDelay);

renderTable();

window.addEventListener("load", () => {
  setTimeout(startScanner, 300);
});



  function undoLastScan() {

  const group =
    getLastScanGroup();

  if (group.length === 0) {

    alert("Nothing to undo");

    return;
  }

  group.forEach(scan => {

    const inventory =
      boxes[scan.box];

    if (!inventory) {
      return;
    }

    const item =
      inventory[scan.key];

    if (!item) {
      return;
    }

    item.qty--;

    if (item.qty <= 0) {

      delete inventory[scan.key];
    }
  });

  const last =
    group[group.length - 1];

  currentBox =
    last.box;

  currentBoxNumber =
    parseInt(
      currentBox.replace("BOX_", "")
    );

  scanHistory.splice(
    scanHistory.length - group.length,
    group.length
  );

  beep(false);

  navigator.vibrate?.(150);

  document.getElementById("status")
    .innerHTML =
    `
    <div style="
      color:#ef6c00;
      font-size:22px;
      font-weight:bold;
    ">
      Removed ${group.length} scans
    </div>
    `;

  renderTable();

  saveData();
}



    // =========================
    // filtro busqueda
    // =========================

    function updateSearch() {

      searchTerm =
       document
       .getElementById("searchInput")
       .value
       .toLowerCase();

      const table =
        document.querySelector("table");

      table.style.display =
        searchTerm
          ? "none"
          : "table";

      renderGlobalSearch();

      renderTable();
    }


    function renderGlobalSearch() {

  const container =
    document.getElementById(
      "searchResults"
    );

  container.innerHTML = "";

  if (!searchTerm) {
    return;
  }

  Object.entries(boxes)
    .forEach(([boxName, inventory]) => {

      Object.values(inventory)
        .forEach(item => {

          const text =
            (
              item.partNumber +
              " " +
              item.nameEN
            ).toLowerCase();

          if (
            !text.includes(searchTerm)
          ) {
            return;
          }

          const div =
            document.createElement("div");

          div.style = `
            background:white;
            padding:12px;
            margin-bottom:8px;
            border-radius:10px;
            border:1px solid #ddd;
          `;

          div.innerHTML = `
            <strong>
              ${item.partNumber}
            </strong>
            <br>

            ${item.nameEN}

            <br><br>

            <strong>
              ${boxName}
            </strong>

            — Qty:
            ${item.qty}
          `;

          div.onclick = () => {

            currentBox = boxName;

            currentBoxNumber =
              parseInt(
                boxName.replace("BOX_", "")
              );

            renderTable();

            container.innerHTML = "";

            document
              .getElementById("searchInput")
              .value = "";

            searchTerm = "";
          };

          container.appendChild(div);
        });
    });
}


    // =========================
    // LOCAL SAVE
    // =========================

    function saveData() {

     const data = {
      projectName,
      currentBoxNumber,
      currentBox,
      scanDelay,
      boxes
     };

      localStorage.setItem(
       "qrInventoryData",
      JSON.stringify(data)
     );
    }

    function loadData() {

  const saved =
    localStorage.getItem("qrInventoryData");

  if (!saved) {
    return;
  }

  try {

    const data =
      JSON.parse(saved);

    projectName =
  data.projectName || "";

    currentBoxNumber =
      data.currentBoxNumber || 1;

    currentBox =
      data.currentBox || "BOX_001";

    Object.keys(boxes).forEach(key => {
      delete boxes[key];
    });

    Object.assign(
      boxes,
      data.boxes || {}
    );

    scanDelay = data.scanDelay ?? 800;

  }
  catch(err) {

    console.error(
      "Error loading saved data",
      err
    );
  }
}


    // =========================
    // lista cajas
    // =========================

    function toggleBoxList() {

    const boxList =
      document.getElementById("boxList");

      if (boxList.style.display === "none") {

        renderBoxList();

        boxList.style.display = "block";

      }
      else {

        boxList.style.display = "none";
      }
    }

    function renderBoxList() {

      const boxList =
        document.getElementById("boxList");

      boxList.innerHTML = "";

      Object.keys(boxes)
        .sort()
        .forEach(boxName => {

          const inventory =
            boxes[boxName] || {};

          let total = 0;

          Object.values(inventory)
            .forEach(item => {

            total += item.qty || 0;

          });

          const boxDiv =
            document.createElement("div");

          boxDiv.style = `
            background:#1e1e1e;
            padding:12px;
            margin-bottom:8px;
            border-radius:10px;
            cursor:pointer;
            border:${
              boxName === currentBox
                ? "2px solid #4caf50"
                : "1px solid #333"
            };
          `;

          boxDiv.innerHTML = `
            <strong>${boxName}</strong>
            <br>
            ${total} items
          `;

          boxDiv.onclick = () => {

            currentBox = boxName;

            currentBoxNumber =
              parseInt(
                boxName.replace("BOX_", "")
              );

            renderTable();

            boxList.style.display = "none";
          };

          boxList.appendChild(boxDiv);
        });
    }

    // =========================
    // EXPORT EXCEL
    // =========================

    function styleWorksheet(worksheet) {

      const range =
        XLSX.utils.decode_range(
          worksheet["!ref"]
        );

      for (
        let R = range.s.r;
        R <= range.e.r;
        ++R
      ) {

        for (
          let C = range.s.c;
          C <= range.e.c;
          ++C
        ) {

          const cellAddress =
            XLSX.utils.encode_cell({
              r: R,
              c: C
            });

          const cell =
            worksheet[cellAddress];

          if (!cell) {
            continue;
          }

          cell.s = {

            font: {
              name: "Arial",
              sz: 11
            },

            alignment: {
              vertical: "center"
            }

          };

          // HEADER TABLE

          if (R === 4) {

            cell.s = {

              font: {
                bold: true,
                color: {
                  rgb: "FFFFFF"
                }
              },

              fill: {
                fgColor: {
                  rgb: "1976D2"
                }
              },

              alignment: {
                horizontal: "center",
                vertical: "center"
              },

              border: {
                top: {
                  style: "thin",
                  color: { rgb: "CCCCCC" }
                },
                bottom: {
                  style: "thin",
                  color: { rgb: "CCCCCC" }
                },
                left: {
                  style: "thin",
                  color: { rgb: "CCCCCC" }
                },
                right: {
                  style: "thin",
                  color: { rgb: "CCCCCC" }
                }
              }

            };
          }

          // INFO ROWS

          if (
            R <= 2 &&
            C === 0
          ) {

            cell.s.font = {
              bold: true
            };
          }

          // ZEBRA ROWS

          if (
            R >= 5 &&
            R % 2 === 0
          ) {

            cell.s.fill = {
              fgColor: {
                rgb: "F5F5F5"
              }
            };
          }

          // QTY COLUMN

          if (
            C === 2 &&
            R >= 5
          ) {

            cell.s.alignment = {
              horizontal: "center"
            };

            cell.s.font = {
              bold: true
            };
          }
        }
      }
    }

    function downloadExcel() {

        const exportName =
      prompt("Export Name");

     if (!exportName) {
       return;
     }

const safeExportName =
  exportName.replace(
    /[^a-z0-9]/gi,
    "_"
  );

        const workbook =
        XLSX.utils.book_new();

        // =========================
        // SUMMARY DATA
        // =========================

        const totalBoxes =
          Object.keys(boxes).length;

        let totalItems = 0;

        const summaryRows = [];

        Object.entries(boxes)
          .forEach(([boxName, inventory]) => {

            let boxTotal = 0;

            Object.values(inventory)
              .forEach(item => {

                boxTotal += item.qty;
                totalItems += item.qty;

              });

            summaryRows.push([
              boxName,
              boxTotal
            ]);
          });

        const summarySheet =
          XLSX.utils.aoa_to_sheet([

            ["Project", projectName],
            ["Export Date", new Date().toLocaleDateString()],
            [],
            ["Total Boxes", totalBoxes],
            ["Total Items", totalItems],
            [],
            ["Box", "Items"],
            ...summaryRows

          ]);

        // Column widths

        summarySheet["!cols"] = [
          { wch: 25 },
          { wch: 15 }
        ];

        // Freeze header

        summarySheet["!freeze"] = {
          xSplit: 0,
          ySplit: 7
        };

        // Filter

        summarySheet["!autofilter"] = {
          ref: "A7:B7"
        };

        // Add sheet

        XLSX.utils.book_append_sheet(
          workbook,
          summarySheet,
          "SUMMARY"
        );

        Object.entries(boxes)
            .forEach(([boxName, inventory]) => {

            const data =
                Object.values(inventory).map(item => ({
                "Part Number": item.partNumber,
                "Details": item.nameEN,
                "Qty": item.qty
                }));

            const worksheet = XLSX.utils.aoa_to_sheet([

              [`Project`, projectName],
              [`Box`, boxName],
              [`Export Date`, new Date().toLocaleDateString()],
              [],

              ["Part Number", "Details", "Qty"]

            ]);

            XLSX.utils.sheet_add_json(
              worksheet,
              data,
              {
                origin: "A6",
                skipHeader: true
              }
            );

                // Column widths

                  worksheet["!cols"] = [
                    { wch: 22 },
                    { wch: 45 },
                    { wch: 10 }
                  ];

                  // Auto filter

                  worksheet["!autofilter"] = {
                    ref: "A5:C5"
                  };

                  // Freeze top row

                  worksheet["!freeze"] = {
                    xSplit: 0,
                    ySplit: 5
                  };

                  styleWorksheet(worksheet);

            XLSX.utils.book_append_sheet(
                workbook,
                worksheet,
                boxName
            );
            });

        const now = new Date();

const date =
  now
    .toISOString()
    .slice(0, 10)
    .replace("T", "_")
    .replace(":", "-");


Object.values(boxes)
  .forEach(inventory => {

    Object.values(inventory)
      .forEach(item => {

        totalItems += item.qty;

      });
  });

const fileName =
  `${safeExportName}_` +
  `${date}_` +
  `${totalBoxes}Boxes_` +
  `${totalItems}Items.xlsx`;

        XLSX.writeFile(
            workbook,
            fileName
        );
    }


    // =========================
    // scanGroup
    // =========================

    function getLastScanGroup() {

  if (scanHistory.length === 0) {
    return [];
  }

  const group = [];

  const last =
    scanHistory[
      scanHistory.length - 1
    ];

  group.push(last);

  for (
    let i = scanHistory.length - 2;
    i >= 0;
    i--
  ) {

    const current =
      scanHistory[i];

    const sameKey =
      current.key === last.key;

    const sameBox =
      current.box === last.box;

    const closeTime =
      last.timestamp -
      current.timestamp
      <= undoGroupDelay;

    if (
      sameKey &&
      sameBox &&
      closeTime
    ) {

      group.push(current);

    } else {

      break;
    }
  }

  return group;
}

    // =========================
    // CLEAR DATA
    // =========================

    function clearData() {

  if (!confirm("Clear ALL data?")) {
    return;
  }

  // Reset boxes

  currentBoxNumber = 1;

  currentBox = "BOX_001";

  projectName = "";

  Object.keys(boxes).forEach(key => {
    delete boxes[key];
  });

  boxes[currentBox] = {};

  // Clear local storage

  localStorage.removeItem(
    "qrInventoryData"
  );

  // Clear UI

  document.getElementById("status")
    .innerHTML = "";

  renderTable();

  saveData();
}

  navigator.serviceWorker
    .register("./service-worker.js")
    .then(() => {

      console.log(
        "Service Worker Registered"
      );

    });
}
